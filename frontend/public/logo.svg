<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Pipeline Studio">
  <!-- Brand-blue rounded tile -->
  <rect width="512" height="512" rx="112" ry="112" fill="#2563eb"/>

  <!--
    Edges as absolute-coordinate polygons (no transforms = no rasterizer
    quirks). Each edge is a 28px-wide rectangle from a source node center
    to the merge node center. Math:
      source A = (160, 160)  -> merge = (336, 256)
      vector  = (176, 96)    length L = 201.0
      unit    = (0.876, 0.477)
      perpendicular unit = (-0.477, 0.876)  (rotate 90° CCW)
      half-width offset = 14 * perp = (-6.68, 12.27)
      polygon corners = source ± offset, merge ± offset
  -->
  <!-- Top edge: (160,160) -> (336,256), half-width 14 -->
  <polygon
    points="153.32,172.27 166.68,147.73 342.68,243.73 329.32,268.27"
    fill="#ffffff"
  />
  <!-- Bottom edge: (160,352) -> (336,256), mirrored about y=256 -->
  <polygon
    points="166.68,364.27 153.32,339.73 329.32,243.73 342.68,268.27"
    fill="#ffffff"
  />

  <!-- Source nodes: dark-blue ring (outer) + white center -->
  <circle cx="160" cy="160" r="58" fill="#1d4ed8"/>
  <circle cx="160" cy="160" r="44" fill="#ffffff"/>

  <circle cx="160" cy="352" r="58" fill="#1d4ed8"/>
  <circle cx="160" cy="352" r="44" fill="#ffffff"/>

  <!-- Merge node (larger): dark-blue ring + white center -->
  <circle cx="336" cy="256" r="76" fill="#1d4ed8"/>
  <circle cx="336" cy="256" r="60" fill="#ffffff"/>
</svg>
