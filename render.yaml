# Render Blueprint for Pipeline Studio.
#
# Two services:
#   1. pipeline-studio-backend   FastAPI web service (Python)
#   2. vectorshift-studio        Vite static site (built from frontend/dist)
#
# Wiring (one manual step):
#   On first deploy Render will prompt you to set:
#     - VITE_API_BASE_URL on the static site (e.g. https://pipeline-studio-backend.onrender.com)
#     - FRONTEND_HOST on the backend (e.g. vectorshift-studio.onrender.com)
#   These are marked sync:false so the dashboard prompts for them.
#
# Why not fromService: Render's `property: host` on a build-time env returns
# only the service slug (e.g. "pipeline-studio-backend"), not the FQDN. That
# produced URLs like https://pipeline-studio-backend which fail DNS. Setting
# explicit values on the dashboard is the reliable path.
#
# Apply: Render dashboard -> New -> Blueprint -> pick this repo -> Apply.
# Docs: https://render.com/docs/infrastructure-as-code

projects:
  - name: vectorshift-studio
    environments:
      - name: production
        services:
          - type: web
            name: pipeline-studio-backend
            runtime: python
            rootDir: backend
            plan: free
            autoDeploy: true
            healthCheckPath: /health
            buildCommand: pip install -r requirements.txt
            startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
            envVars:
              - key: PYTHON_VERSION
                value: "3.12.5"
              - key: LOG_LEVEL
                value: INFO
              - key: FRONTEND_HOST
                sync: false

          - type: web
            runtime: static
            name: vectorshift-studio
            rootDir: frontend
            autoDeploy: true
            buildCommand: npm ci && npm run build
            staticPublishPath: ./dist
            headers:
              - path: /*
                name: X-Frame-Options
                value: DENY
              - path: /*
                name: X-Content-Type-Options
                value: nosniff
              - path: /*
                name: Referrer-Policy
                value: strict-origin-when-cross-origin
            routes:
              - type: rewrite
                source: /*
                destination: /index.html
            envVars:
              - key: NODE_VERSION
                value: "20.18.0"
              - key: VITE_API_BASE_URL
                sync: false
